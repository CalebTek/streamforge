name: Publish StreamForge.Core to NuGet.org

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # required for NuGet Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/StreamForge.Tests/StreamForge.Tests.csproj --configuration Release --no-build --no-restore

      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          dotnet pack src/StreamForge.Core/StreamForge.Core.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkgs \
            -p:PackageVersion=${{ steps.version.outputs.VERSION }}

      # NuGet/login@v1 exchanges the GitHub OIDC token for a short-lived NuGet API key.
      # No stored secret needed — configure Trusted Publishers on nuget.org first:
      #   nuget.org → Account → Trusted Publishers → Add → GitHub Actions
      #   owner: CalebTek  repo: streamforge  workflow: publish.yml
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: CalebTek

      - name: Push packages to NuGet.org
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Push symbol packages
        run: |
          dotnet nuget push "./nupkgs/*.snupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: ./nupkgs/
